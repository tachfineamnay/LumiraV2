name: CI

on:
  # Direct pushes to main are validated once through deploy.yml.
  # Keeping main here as well would run the full CI twice on every production push.
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Quality, build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      # pnpm 8 still targets npm's retired audit endpoint. Run the audit with
      # pnpm 11, which uses npm's bulk advisory endpoint, without migrating
      # the workspace lockfile used for installation.
      - name: Audit dependencies (high severity)
        run: corepack pnpm@11.0.0 audit --audit-level=high

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

  e2e:
    name: Browser smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Build web application for browser smoke tests
        run: pnpm --filter web... build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: pnpm exec playwright test
        env:
          CI: true
