name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Non-sensitive values for Next.js build and E2E (never use production secrets in CI).
  NEXT_PUBLIC_API_URL: http://127.0.0.1:3100
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder_not_real
  API_INTERNAL_URL: http://127.0.0.1:3100
  JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
  PLAYWRIGHT_WEB_PORT: '3100'

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      # pnpm 8 still targets npm's retired audit endpoint. Run the audit with
      # pnpm 11, which uses npm's bulk advisory endpoint, without migrating
      # the workspace lockfile used for installation.
      - name: Audit dependencies (high severity)
        run: corepack pnpm@11.0.0 audit --audit-level=high

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Build web application for Playwright
        run: pnpm --filter web... build

      - name: Install Playwright Chromium and system dependencies
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: pnpm exec playwright test
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
