version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: lumira
      POSTGRES_PASSWORD: lumira_dev
      POSTGRES_DB: lumira
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lumira-network

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: always
    ports:
      - "3002:3000"
    networks:
      - lumira-network

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_test_replace_me}
        API_INTERNAL_URL: http://api:3001
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_test_replace_me}
      - API_INTERNAL_URL=http://api:3001
      - JWT_SECRET=${JWT_SECRET:-dev-only-change-me-in-production-64chars-minimum!!}
    depends_on:
      - api
    networks:
      - lumira-network

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://lumira:lumira_dev@postgres:5432/lumira
      - GOTENBERG_URL=http://gotenberg:3000
      - JWT_SECRET=${JWT_SECRET:-dev-only-change-me-in-production-64chars-minimum!!}
      - JWT_EXPIRATION=30d
      - WEB_URL=http://localhost:3000
      - SETTINGS_ENCRYPTION_KEY=${SETTINGS_ENCRYPTION_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - MAIL_FROM=${MAIL_FROM:-noreply@oraclelumira.local}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_replace_me}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_replace_me}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-replace_me}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-replace_me}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-replace_me}
      - AWS_REGION=${AWS_REGION:-eu-west-3}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME:-lumira-readings-dev}
      - AWS_UPLOADS_BUCKET_NAME=${AWS_UPLOADS_BUCKET_NAME:-lumira-uploads-dev}
      - NODE_ENV=development
    depends_on:
      - postgres
      - gotenberg
    networks:
      - lumira-network

networks:
  lumira-network:
    driver: bridge

volumes:
  postgres_data:
